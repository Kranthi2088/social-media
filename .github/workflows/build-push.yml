name: Build and Push Microservices

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-common:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: app/packages/common/package-lock.json

      - name: Build common package
        working-directory: app/packages/common
        run: |
          npm ci
          npm run build

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push common package
        uses: docker/build-push-action@v5
        with:
          context: app/packages/common
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/common:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-auth-service:
    runs-on: ubuntu-latest
    needs: build-common
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: app/apps/auth-svc/package-lock.json

      - name: Build auth service
        working-directory: app/apps/auth-svc
        run: |
          npm ci
          npm run build

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push auth service
