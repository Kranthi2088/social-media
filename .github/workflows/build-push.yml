          context: app/apps/auth-svc
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/auth-svc:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-users-service:
