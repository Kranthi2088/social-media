version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: social_media_postgres
    environment:
      POSTGRES_DB: social_media
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - social_media_network

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: social_media_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - social_media_network

  # MongoDB for image storage
  mongodb:
    image: mongo:7.0
    container_name: social_media_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: social_media
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - social_media_network

  # MinIO for file storage (S3 compatible)
  minio:
    image: minio/minio:latest
    container_name: social_media_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - social_media_network

  # Auth Service
  auth-svc:
    build:
      context: ../../apps/auth-svc
      dockerfile: Dockerfile
    container_name: social_media_auth_svc
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/social_media
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
    networks:
      - social_media_network

  # Users Service
  users-svc:
    build:
      context: ../../apps/users-svc
      dockerfile: Dockerfile
    container_name: social_media_users_svc
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/social_media
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - PORT=3002
    ports:
      - "3002:3002"
    depends_on:
      - postgres
      - redis
    networks:
      - social_media_network

  # Posts Service
  posts-svc:
    build:
      context: ../../apps/posts-svc
      dockerfile: Dockerfile
    container_name: social_media_posts_svc
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/social_media
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/social_media?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - PORT=3003
    ports:
      - "3003:3003"
    depends_on:
      - postgres
      - mongodb
      - redis
    networks:
      - social_media_network

  # Media Service
  media-svc:
    build:
      context: ../../apps/media-svc
      dockerfile: Dockerfile
    container_name: social_media_media_svc
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/social_media
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=social-media-files
      - PORT=3004
    ports:
      - "3004:3004"
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - social_media_network

  # Feed Service
  feed-svc:
    build:
      context: ../../apps/feed-svc
      dockerfile: Dockerfile
    container_name: social_media_feed_svc
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/social_media
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_URL=redis://redis:6379
      - PORT=3005
    ports:
      - "3005:3005"
    depends_on:
      - postgres
      - redis
    networks:
      - social_media_network

  # Web Frontend
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
    container_name: social_media_web
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3000
      - NEXT_PUBLIC_AUTH_SVC_URL=http://localhost:3001
      - NEXT_PUBLIC_USERS_SVC_URL=http://localhost:3002
      - NEXT_PUBLIC_POSTS_SVC_URL=http://localhost:3003
      - NEXT_PUBLIC_MEDIA_SVC_URL=http://localhost:3004
      - NEXT_PUBLIC_FEED_SVC_URL=http://localhost:3005
    ports:
      - "3000:3000"
    depends_on:
      - auth-svc
      - users-svc
      - posts-svc
      - media-svc
      - feed-svc
    networks:
      - social_media_network

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  minio_data:

networks:
  social_media_network:
    driver: bridge
